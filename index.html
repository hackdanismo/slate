<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Sets the character encoding for the document to UTF-8. -->
    <meta charset="UTF-8">
    <!-- Controls how the page scales and displays on different screen sizes, especially mobile devices. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Provides a short summary of the page for search engines and link previews. -->
    <meta name="description" content="">
    <!-- Defines the title shown when the page is shared on social platforms. -->
    <meta property="og:title" content="Slate - The building blocks of your Design Syste">
    <!-- Defines the description shown when the page is shared on social platforms. -->
    <meta property="og:description" content="">
    <!-- Sets the image shown when the page is shared on social platforms. -->
    <meta property="og:image" content="https://example.com/preview-image.jpg">
    <!-- Sets the canonical URL used when the page is shared on social platforms. -->
    <meta property="og:url" content="https://example.com/my-page">
    <!-- Defines the type of content being shared, such as a website, article, or video. -->
    <meta property="og:type" content="website">
    <!-- Defines the name of the website or brand shown in social link previews. -->
    <meta property="og:site_name" content="Slate">
    <!-- Sets the locale/language region for the shared page metadata. -->
    <meta property="og:locale" content="en">
    
    <title>Slate - The building blocks of your Design System</title>
</head>
<body>
    <main role="main">
        <!-- Page content. -->
    </main>
</body>
</html>
